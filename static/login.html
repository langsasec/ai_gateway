<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI大模型API网关 - 登录</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
    }
    .login-container {
      width: 420px;
      padding: 48px 40px;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(20px);
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
    }
    .login-logo {
      text-align: center;
      margin-bottom: 36px;
    }
    .login-logo .icon-wrap {
      width: 72px; height: 72px;
      margin: 0 auto 14px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px;
      box-shadow: 0 4px 20px rgba(102,126,234,0.5);
    }
    .login-logo h1 {
      font-size: 22px;
      color: #fff;
      font-weight: 700;
      letter-spacing: 1px;
    }
    .login-logo p {
      color: rgba(255,255,255,0.5);
      font-size: 13px;
      margin-top: 6px;
    }
    .form-group { margin-bottom: 20px; }
    .form-label {
      display: block;
      color: rgba(255,255,255,0.75);
      font-size: 14px;
      margin-bottom: 8px;
      font-weight: 500;
    }
    .form-control {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      color: #fff;
      font-size: 15px;
      transition: all 0.3s;
      outline: none;
    }
    .form-control:focus {
      border-color: #667eea;
      background: rgba(255,255,255,0.12);
      box-shadow: 0 0 0 3px rgba(102,126,234,0.25);
    }
    .form-control::placeholder { color: rgba(255,255,255,0.3); }
    .btn-login {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 8px;
      letter-spacing: 1px;
    }
    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102,126,234,0.5);
    }
    .btn-login:active { transform: translateY(0); }
    .btn-login:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }
    .error-msg {
      color: #ff6b6b;
      font-size: 13px;
      margin-top: 12px;
      text-align: center;
      min-height: 20px;
    }
    .footer-tip {
      text-align: center;
      color: rgba(255,255,255,0.3);
      font-size: 12px;
      margin-top: 32px;
    }
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-logo">
      <div class="icon-wrap">🤖</div>
      <h1>AI大模型API网关</h1>
      <p>统一代理 · 安全管控 · 全量审计</p>
    </div>
    <form id="loginForm">
      <div class="form-group">
        <label class="form-label">管理员账号</label>
        <input type="text" id="username" class="form-control" placeholder="请输入账号" autocomplete="username" value="admin">
      </div>
      <div class="form-group">
        <label class="form-label">登录密码</label>
        <input type="password" id="password" class="form-control" placeholder="请输入密码" autocomplete="current-password" value="admin123">
      </div>
      <button type="submit" class="btn-login" id="loginBtn">登 录</button>
      <div class="error-msg" id="errorMsg"></div>
    </form>
    <div class="footer-tip">v1.0.0 &nbsp;|&nbsp; AI Gateway Management Console</div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const errorMsg = document.getElementById('errorMsg');
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();

      if (!username || !password) {
        errorMsg.textContent = '请输入账号和密码';
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>登录中...';
      errorMsg.textContent = '';

      try {
        const resp = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await resp.json();
        if (resp.ok && data.access_token) {
          localStorage.setItem('token', data.access_token);
          localStorage.setItem('username', username);
          window.location.href = '/';
        } else {
          errorMsg.textContent = data.detail || '登录失败，请检查账号密码';
        }
      } catch (err) {
        errorMsg.textContent = '网络错误，请稍后重试';
      } finally {
        btn.disabled = false;
        btn.innerHTML = '登 录';
      }
    });

    // 回车提交
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('loginForm').requestSubmit();
    });
  </script>
</body>
</html>
